<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Starfall Showdown</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="rotateNotice">Rotate your phone for the best experience</div>

    <section id="matchIntro" class="screen active">
      <div class="intro-bg"></div>
      <div id="cardsGrid"></div>
      <div class="intro-bottom">
        <div class="modeText">Every Starfighter for themselves!</div>
        <div class="countdownWrap">Match starts in <span id="introCountdown">5</span></div>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <canvas id="gameCanvas" width="1280" height="720"></canvas>
      <div id="hudTop">
        <div id="brawlersLeft">Brawlers left: 10</div>
      </div>
      <div id="playerNameTag">You</div>
      <div id="joystickBase"><div id="joystickKnob"></div></div>
      <div id="shootStickBase"><div id="shootStickKnob"></div></div>
      <button id="superButton" aria-label="Super"></button>
      <button id="shootButton" aria-label="Shoot">TAP</button>
      <div id="killFeed"></div>
      <div id="endOverlay" class="hidden">
        <div class="end-card">
          <div id="endTitle">You Win!</div>
          <div id="endSubtitle">Rank 1</div>
          <button id="playAgainBtn">Play Again</button>
        </div>
      </div>
    </section>
  </div>
  <script src="game.js"></script>
</body>
</html>
